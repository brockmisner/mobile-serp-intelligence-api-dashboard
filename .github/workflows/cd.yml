name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      deploy_sha:
        description: "Known-good main commit SHA for manual deploy/rollback. Leave blank for latest main."
        required: false
        type: string
      reason:
        description: "Reason for the manual deploy/rollback run."
        required: false
        type: string

concurrency:
  group: cd-production
  cancel-in-progress: false

jobs:
  deploy:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    environment:
      name: production
    steps:
      - name: Checkout target revision
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Resolve deploy target
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          manual_sha="$(jq -r '.inputs.deploy_sha // empty' "$GITHUB_EVENT_PATH")"
          manual_reason="$(jq -r '.inputs.reason // empty' "$GITHUB_EVENT_PATH")"
          workflow_sha="$(jq -r '.workflow_run.head_sha // empty' "$GITHUB_EVENT_PATH")"

          if [ -n "$manual_sha" ]; then
            deploy_ref="$manual_sha"
          elif [ -n "$workflow_sha" ]; then
            deploy_ref="$workflow_sha"
          else
            deploy_ref="origin/main"
          fi

          deploy_sha="$(git rev-parse --verify "${deploy_ref}^{commit}")"

          if ! git merge-base --is-ancestor "$deploy_sha" origin/main; then
            echo "::error::Resolved SHA $deploy_sha is not in main branch history."
            exit 1
          fi

          git checkout --detach "$deploy_sha"
          echo "deploy_sha=$deploy_sha" >> "$GITHUB_OUTPUT"
          echo "deploy_ref=$deploy_ref" >> "$GITHUB_OUTPUT"
          echo "deploy_reason=$manual_reason" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Build
        run: npm run build

      - name: Deploy
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
          DEPLOY_AUTH_TOKEN: ${{ secrets.DEPLOY_AUTH_TOKEN }}
          DEPLOY_ENVIRONMENT: production
          DEPLOY_REASON: ${{ steps.resolve.outputs.deploy_reason }}
          DEPLOY_SHA: ${{ steps.resolve.outputs.deploy_sha }}
          DEPLOY_REF: ${{ steps.resolve.outputs.deploy_ref }}
          DEPLOY_ACTOR: ${{ github.actor }}
          DEPLOY_REPOSITORY: ${{ github.repository }}
        run: npm run deploy

      - name: Smoke test
        env:
          DEPLOYMENT_URL: ${{ secrets.SMOKE_TEST_URL || vars.SMOKE_TEST_URL }}
        run: npm run test:smoke:deployment

      - name: Deployment summary
        env:
          DEPLOY_SHA: ${{ steps.resolve.outputs.deploy_sha }}
          DEPLOY_REF: ${{ steps.resolve.outputs.deploy_ref }}
          DEPLOY_REASON: ${{ steps.resolve.outputs.deploy_reason }}
        run: |
          {
            echo "### Deployment Metadata"
            echo ""
            echo "- Deployed SHA: \`$DEPLOY_SHA\`"
            echo "- Requested ref: \`$DEPLOY_REF\`"
            if [ -n "$DEPLOY_REASON" ]; then
              echo "- Manual reason: $DEPLOY_REASON"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
